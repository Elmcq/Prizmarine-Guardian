<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prizmarine Guardian — Dashboard</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/android-chrome-192x192.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/topbar-brand.css" />
</head>
<body>
  <div id="login" class="overlay">
    <form id="login-form" class="login-card">
      <h1>🛡️ Prizmarine Guardian</h1>
      <p class="muted">Enter your dashboard token to continue.</p>
      <input id="token" type="password" placeholder="DASHBOARD_TOKEN" autocomplete="off" />
      <button type="submit">Unlock</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <div id="app" class="hidden">
    <header class="topbar">
      <span class="topbar-brand" id="topbar-brand" aria-live="polite">🛡️ Prizmarine Guardian</span>
      <span class="topbar-divider"></span>
      <a href="#" id="topbar-logout" class="topbar-logout">
        <svg viewBox="0 0 512 512" width="14" height="14"><path fill="currentColor" d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9 9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path></svg>
        Logout
      </a>
    </header>

    <main class="content">
      <section id="overview">
        <h2>Overview</h2>
        <div id="overview-cards" class="cards"></div>
      </section>

      <section id="analytics">
        <div class="section-head">
          <h2>Moderation Analytics</h2>
          <select id="analytics-range">
            <option value="today">Today</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
            <option value="all" selected>All Time</option>
          </select>
          <button id="export-btn" class="ghost">Export</button>
        </div>
        <div id="analytics-cards" class="cards"></div>
      </section>

      <section id="violations">
        <div class="section-head">
          <h2>Top Violations</h2>
        </div>
        <div id="violations-table" class="table-wrap"></div>
      </section>

      <section id="modules">
        <div class="section-head">
          <h2>Modules</h2>
        </div>
        <div id="modules-cards" class="cards"></div>
      </section>

      <section id="rules">
        <div class="section-head">
          <h2>Rules</h2>
          <button id="add-rule" class="primary">+ Add rule</button>
        </div>
        <div id="rules-list" class="table-wrap"></div>
      </section>

      <section id="incidents">
        <div class="section-head">
          <h2>Incidents</h2>
          <select id="incident-module">
            <option value="toxicity">Toxicity</option>
            <option value="nsfw">NSFW</option>
            <option value="advertisement">Advertisement</option>
            <option value="raid">Raid</option>
            <option value="sticker">Sticker</option>
          </select>
          <select id="incident-range">
            <option value="today">Today</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
            <option value="all" selected>All Time</option>
          </select>
          <button id="refresh-incidents" class="ghost">Refresh</button>
        </div>
        <div id="incidents-table" class="table-wrap"></div>
      </section>

      <section id="audit">
        <div class="section-head">
          <h2>Audit Log</h2>
          <button id="refresh-audit" class="ghost">Refresh</button>
        </div>
        <div id="audit-table" class="table-wrap"></div>
      </section>

      <section id="bans">
        <div class="section-head">
          <h2>Bans</h2>
          <button id="refresh-bans" class="ghost">Refresh</button>
        </div>
        <div id="bans-table" class="table-wrap"></div>
      </section>

      <section id="warnings">
        <div class="section-head">
          <h2>Warnings</h2>
          <button id="refresh-warnings" class="ghost">Refresh</button>
        </div>
        <div id="warnings-table" class="table-wrap"></div>
      </section>
    </main>
  </div>

  <div id="rule-modal" class="overlay hidden">
    <form id="rule-form" class="modal">
      <h2 id="rule-modal-title">Add rule</h2>
      <input type="hidden" id="rule-id-old" />
      <label>ID <input id="rule-id" placeholder="R9" required /></label>
      <label>Title <input id="rule-title" required /></label>
      <label>Description <textarea id="rule-description" rows="3" required></textarea></label>
      <label>Punishment
        <select id="rule-punishment">
          <option>Warn</option>
          <option>Kick</option>
          <option>TempBan</option>
          <option>Ban</option>
        </select>
      </label>
      <div class="modal-actions">
        <button type="button" id="rule-cancel" class="ghost">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
      <p id="rule-error" class="error"></p>
    </form>
  </div>

  <div id="user-modal" class="overlay hidden">
    <div class="modal user-profile-modal">
      <h2>User Moderation Profile</h2>
      <div id="user-profile-content"></div>
      <div class="modal-actions">
        <button type="button" id="user-profile-close" class="ghost">Close</button>
      </div>
    </div>
  </div>

  <div id="export-modal" class="overlay hidden">
    <div class="modal">
      <h2>Export Report</h2>
      <label>Range
        <select id="export-range">
          <option value="today">Today</option>
          <option value="7d">Last 7 Days</option>
          <option value="30d">Last 30 Days</option>
          <option value="all">All Time</option>
        </select>
      </label>
      <label>Format
        <select id="export-format">
          <option value="json">JSON</option>
          <option value="csv">CSV</option>
        </select>
      </label>
      <div class="modal-actions">
        <button type="button" id="export-cancel" class="ghost">Cancel</button>
        <button type="button" id="export-download" class="primary">Download</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="/topbar-brand.js"></script>
  <script src="/app.js"></script>
</body>
</html>
